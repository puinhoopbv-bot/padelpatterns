<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e14" />
<title>Pista 3D — Padel Strategie Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;1,9..144,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-night: #07090d;
    --bg-panel: rgba(17, 22, 31, 0.85);
    --bg-elev: rgba(26, 33, 45, 0.9);
    --border: #2a3340;
    --border-light: rgba(255, 255, 255, 0.08);
    --text: #e8e4dc;
    --text-dim: #8a9099;
    --text-faint: #525a66;
    --accent: #d4ff00;
    --accent-warm: #ff6b35;
    --court-blue: #1e6091;
    --player-a: #ff6b35;
    --player-b: #4a9eff;
    --ball: #d4ff00;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg-night);
    color: var(--text);
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 300;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #scene-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  #scene-container canvas {
    display: block;
  }

  /* Atmospheric overlay */
  .vignette {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      radial-gradient(ellipse at center, transparent 30%, rgba(7, 9, 13, 0.6) 100%);
  }

  .grain {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.6'/%3E%3C/svg%3E");
    opacity: 0.04;
    mix-blend-mode: overlay;
  }

  /* HEADER */
  header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 10;
    padding: 18px 28px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(to bottom, rgba(7, 9, 13, 0.85), transparent);
    pointer-events: none;
  }

  header > * { pointer-events: auto; }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 0.04em;
    color: var(--text);
    line-height: 0.85;
  }

  .brand-mark span {
    color: var(--accent);
  }

  .brand-mark sup {
    font-size: 14px;
    color: var(--accent-warm);
    margin-left: 4px;
    letter-spacing: 0.1em;
  }

  .brand-tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-faint);
    padding-left: 14px;
    border-left: 1px solid var(--border);
  }

  .mode-switch {
    display: flex;
    gap: 0;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
  }

  .mode-switch button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 14px;
    letter-spacing: 0.12em;
    padding: 10px 22px;
    cursor: pointer;
    transition: all 0.2s;
    border-right: 1px solid var(--border-light);
  }

  .mode-switch button:last-child { border-right: none; }

  .mode-switch button.active {
    background: var(--accent);
    color: var(--bg-night);
  }

  .mode-switch button:hover:not(.active) {
    color: var(--text);
  }

  /* LEFT PANEL — strategy list */
  .panel-left {
    position: fixed;
    left: 24px;
    top: 86px;
    bottom: 24px;
    width: 320px;
    z-index: 10;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .panel-left.collapsed {
    transform: translateX(calc(-100% - 24px));
    transition: transform 0.3s ease-out;
  }

  .panel-header {
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--border-light);
  }

  .panel-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--text-dim);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .panel-title .count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-faint);
    letter-spacing: 0;
  }

  .filters {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border-light);
    overflow-y: auto;
    max-height: 30vh;
  }

  .filter-group {
    margin-bottom: 12px;
  }

  .filter-group:last-child { margin-bottom: 0; }

  .filter-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-faint);
    margin-bottom: 6px;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .chip {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .chip:hover { border-color: var(--text-dim); color: var(--text); }

  .chip.active {
    background: var(--text);
    color: var(--bg-night);
    border-color: var(--text);
  }

  .strategy-list {
    flex: 1;
    overflow-y: auto;
    padding: 8px;
  }

  .strategy-list::-webkit-scrollbar { width: 4px; }
  .strategy-list::-webkit-scrollbar-track { background: transparent; }
  .strategy-list::-webkit-scrollbar-thumb { background: var(--border); }

  .strat-item {
    background: transparent;
    border-left: 2px solid transparent;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: 2px;
  }

  .strat-item:hover {
    border-left-color: var(--text-dim);
    background: rgba(255, 255, 255, 0.02);
  }

  .strat-item.active {
    border-left-color: var(--accent);
    background: rgba(212, 255, 0, 0.05);
  }

  .strat-item-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 16px;
    letter-spacing: 0.06em;
    color: var(--text);
    margin-bottom: 2px;
  }

  .strat-item-name em {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0;
    text-transform: lowercase;
    margin-left: 4px;
    font-weight: 300;
  }

  .strat-item-meta {
    display: flex;
    gap: 6px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 8px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-faint);
  }

  .strat-item-meta .lvl {
    padding: 1px 4px;
    border: 1px solid var(--border);
  }

  .strat-item-meta .lvl.beginner { color: #7dbfff; border-color: #7dbfff44; }
  .strat-item-meta .lvl.intermediate { color: #ffaa5e; border-color: #ffaa5e44; }
  .strat-item-meta .lvl.advanced { color: #ff6b35; border-color: #ff6b3544; }

  /* RIGHT PANEL — detail */
  .panel-right {
    position: fixed;
    right: 24px;
    top: 86px;
    bottom: 100px;
    width: 360px;
    z-index: 10;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    overflow-y: auto;
    padding: 20px;
  }

  .panel-right.collapsed {
    transform: translateX(calc(100% + 24px));
    transition: transform 0.3s ease-out;
  }

  .strat-name-big {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 0.03em;
    line-height: 1;
    color: var(--text);
    margin-bottom: 4px;
  }

  .strat-spanish-big {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
    font-size: 16px;
    margin-bottom: 12px;
  }

  .strat-summary-big {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border-light);
  }

  .detail-section {
    margin-bottom: 18px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border-light);
  }

  .detail-section:last-child { border-bottom: none; padding-bottom: 0; }

  .detail-h {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 8px;
  }

  .detail-body {
    font-family: 'Fraunces', serif;
    font-size: 13px;
    color: var(--text);
    line-height: 1.55;
  }

  .detail-list {
    list-style: none;
    padding: 0;
  }

  .detail-list li {
    font-family: 'Fraunces', serif;
    font-size: 12px;
    color: var(--text-dim);
    padding: 5px 0 5px 16px;
    position: relative;
    line-height: 1.5;
  }

  .detail-list li::before {
    content: '→';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
  }

  .key-shots {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .key-shots span {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    padding: 3px 6px;
    background: var(--bg-elev);
    color: var(--text);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    border: 1px solid var(--border-light);
  }

  .coach-tip {
    font-style: italic;
    color: var(--accent);
    font-size: 13px;
    line-height: 1.5;
    padding: 12px 14px;
    background: rgba(212, 255, 0, 0.04);
    border-left: 2px solid var(--accent);
  }

  /* PLAYBACK BAR */
  /* ===== NEW PLAYBACK DESIGN — prominent play button + floating subtitle ===== */

  /* Floating subtitle card — sits above the play button */
  .subtitle-card {
    position: fixed;
    bottom: 112px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    background: rgba(15, 19, 26, 0.78);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-light);
    border-radius: 14px;
    padding: 14px 22px;
    width: min(560px, calc(100vw - 48px));
    text-align: center;
    transition: opacity 0.4s, transform 0.4s;
  }

  .subtitle-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .subtitle-phase {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    flex-shrink: 0;
  }

  .subtitle-progress {
    display: flex;
    gap: 3px;
    flex: 1;
    max-width: 200px;
  }
  .subtitle-progress span {
    flex: 1;
    height: 2px;
    background: var(--border);
    cursor: pointer;
    transition: background 0.3s;
    border-radius: 1px;
  }
  .subtitle-progress span.played { background: var(--text-dim); }
  .subtitle-progress span.current { background: var(--accent); box-shadow: 0 0 8px rgba(212,255,0,0.5); }

  .subtitle-text {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.4;
    transition: opacity 0.25s;
  }

  /* The big play button cluster at bottom-center */
  .play-cluster {
    position: fixed;
    bottom: 22px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 11;
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .play-btn-big {
    width: 68px;
    height: 68px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--bg-night);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: transform 0.15s, box-shadow 0.3s;
    position: relative;
    box-shadow:
      0 0 0 1px rgba(212,255,0,0.3),
      0 0 28px rgba(212,255,0,0.45),
      0 8px 32px rgba(0,0,0,0.5);
  }

  .play-btn-big::before {
    content: '';
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(212,255,0,0.4);
    opacity: 0;
    transition: opacity 0.3s, transform 0.6s;
    pointer-events: none;
  }

  .play-btn-big:hover {
    transform: scale(1.07);
    box-shadow:
      0 0 0 1px rgba(212,255,0,0.5),
      0 0 40px rgba(212,255,0,0.65),
      0 12px 40px rgba(0,0,0,0.6);
  }
  .play-btn-big:hover::before {
    opacity: 1;
    transform: scale(1.1);
  }
  .play-btn-big:active { transform: scale(0.96); }

  .play-btn-big svg {
    width: 28px;
    height: 28px;
  }
  .play-btn-big svg.play-icon-play {
    margin-left: 4px; /* visual centering for the triangle */
  }

  /* Pulse animation when idle (subtle hint to start) */
  .play-btn-big.idle {
    animation: pulse-glow 2.4s ease-in-out infinite;
  }
  @keyframes pulse-glow {
    0%, 100% {
      box-shadow:
        0 0 0 1px rgba(212,255,0,0.3),
        0 0 28px rgba(212,255,0,0.45),
        0 8px 32px rgba(0,0,0,0.5);
    }
    50% {
      box-shadow:
        0 0 0 1px rgba(212,255,0,0.6),
        0 0 50px rgba(212,255,0,0.7),
        0 8px 32px rgba(0,0,0,0.5);
    }
  }

  /* Compact speed pill — discreet, not competing for attention */
  .speed-toggle {
    display: flex;
    gap: 0;
    background: rgba(15, 19, 26, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--border-light);
    border-radius: 999px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .speed-toggle button {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 8px 11px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: color 0.15s, background 0.15s;
  }
  .speed-toggle button:hover:not(.active) { color: var(--text); }
  .speed-toggle button.active {
    background: rgba(212,255,0,0.15);
    color: var(--accent);
  }

  /* Camera presets */
  .camera-controls {
    position: fixed;
    top: 86px;
    right: 24px;
    z-index: 11;
    display: flex;
    flex-direction: column;
    gap: 4px;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    padding: 8px;
    transform: translateX(calc(360px + 28px));
    transition: transform 0.3s;
  }

  .panel-right.collapsed ~ .camera-controls,
  body:has(.panel-right.collapsed) .camera-controls {
    transform: translateX(0);
  }

  .cam-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 7px 10px;
    cursor: pointer;
    text-align: left;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    text-transform: uppercase;
    border-left: 2px solid transparent;
  }

  .cam-btn:hover { color: var(--text); border-left-color: var(--text-dim); }
  .cam-btn.active { color: var(--accent); border-left-color: var(--accent); }

  /* PANEL TOGGLES */
  .panel-toggle {
    position: fixed;
    z-index: 11;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    width: 28px;
    height: 36px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    transition: all 0.2s;
  }

  .panel-toggle:hover { color: var(--accent); }

  .toggle-left {
    left: 24px;
    top: 50%;
    transform: translateY(-50%);
    border-left: none;
    transition: left 0.3s;
  }

  .panel-left:not(.collapsed) ~ .toggle-left {
    left: 344px;
  }

  .toggle-right {
    right: 24px;
    top: 50%;
    transform: translateY(-50%);
    border-right: none;
    transition: right 0.3s;
  }

  .panel-right:not(.collapsed) ~ .toggle-right {
    right: 384px;
  }

  /* Sandbox controls */
  .sandbox-toolbar {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    display: none;
    gap: 8px;
    background: var(--bg-panel);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-light);
    padding: 10px;
  }

  body.mode-sandbox .sandbox-toolbar { display: flex; }
  body.mode-sandbox .subtitle-card,
  body.mode-sandbox .play-cluster { display: none; }
  body.mode-sandbox .panel-left { display: none; }

  .sb-btn {
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 7px 12px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .sb-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sb-btn.primary { background: var(--accent); color: var(--bg-night); border-color: var(--accent); }

  /* LOADING */
  .loading {
    position: fixed;
    inset: 0;
    background: var(--bg-night);
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    transition: opacity 0.5s;
  }

  .loading.hidden { opacity: 0; pointer-events: none; }

  .loading-mark {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 0.04em;
    color: var(--text);
  }

  .loading-mark span { color: var(--accent); }

  .loading-bar {
    width: 200px;
    height: 1px;
    background: var(--border);
    overflow: hidden;
  }

  .loading-bar::after {
    content: '';
    display: block;
    width: 30%;
    height: 100%;
    background: var(--accent);
    animation: load 1.2s ease-in-out infinite;
  }

  @keyframes load {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  .loading-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Mobile FABs hidden by default (only show under 768px) */
  .mobile-fab { display: none; }
  .mobile-backdrop { display: none; }

  /* Mobile */
  @media (max-width: 1024px) {
    .panel-left, .panel-right {
      width: 280px;
    }
  }

  /* ========================================
     MOBILE LAYOUT (under 768px)
     The 3D court takes the full screen.
     Both side panels become slide-in drawers.
     ======================================== */
  @media (max-width: 768px) {
    /* Header — compact, fixed at top with safe area */
    header {
      padding: 10px 14px;
      padding-top: calc(10px + env(safe-area-inset-top, 0px));
      z-index: 30;
      background: linear-gradient(to bottom, rgba(5, 7, 9, 0.95), rgba(5, 7, 9, 0.7) 80%, transparent);
    }
    .brand-mark { font-size: 26px; }
    .brand-mark sup { font-size: 10px; }
    .brand-tag { display: none; }
    .mode-switch button {
      font-size: 11px;
      padding: 7px 12px;
      letter-spacing: 0.08em;
    }

    /* Left panel — full-height slide-in drawer from left */
    .panel-left {
      left: 0;
      top: 0;
      bottom: 0;
      height: 100vh;
      height: 100dvh; /* dynamic viewport height for iOS Safari */
      padding-top: calc(64px + env(safe-area-inset-top, 0px));
      padding-bottom: env(safe-area-inset-bottom, 0px);
      width: 88vw;
      max-width: 340px;
      z-index: 50; /* well above everything else */
      transform: translateX(-100%);
      transition: transform 0.3s ease-out;
      border-left: none;
      background: rgba(15, 19, 26, 0.98); /* less translucent so it's clearly visible */
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .panel-left.mobile-open {
      transform: translateX(0);
      box-shadow: 0 0 60px rgba(0,0,0,0.7);
    }
    .filters { max-height: none; }

/* =====================================================================
   SETUP THREE.JS
   ===================================================================== */

const container = document.getElementById('scene-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x07090d, 0.018);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
const cameraTarget = new THREE.Vector3(0, 0, 0);
const desiredCamPos = new THREE.Vector3(18, 16, 22);
camera.position.copy(desiredCamPos);
camera.lookAt(cameraTarget);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x07090d, 1);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
container.appendChild(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* =====================================================================
   LIGHTING — moody, padel-club night-style
   ===================================================================== */

const ambient = new THREE.AmbientLight(0xb0c4de, 0.35);
scene.add(ambient);

// Main key light from above (court floodlight)
const keyLight = new THREE.DirectionalLight(0xfff8e7, 1.4);
keyLight.position.set(8, 25, 5);
keyLight.castShadow = true;
keyLight.shadow.mapSize.width = 2048;
keyLight.shadow.mapSize.height = 2048;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 60;
keyLight.shadow.camera.left = -15;
keyLight.shadow.camera.right = 15;
keyLight.shadow.camera.top = 20;
keyLight.shadow.camera.bottom = -20;
keyLight.shadow.bias = -0.0005;
scene.add(keyLight);

// Fill light from opposite side
const fillLight = new THREE.DirectionalLight(0x6db3d4, 0.5);
fillLight.position.set(-10, 15, -8);
scene.add(fillLight);

// Rim accent light
const rimLight = new THREE.DirectionalLight(0xff6b35, 0.25);
rimLight.position.set(0, 5, -15);
scene.add(rimLight);

// Hemisphere (soft sky/ground)
const hemi = new THREE.HemisphereLight(0x556677, 0x111111, 0.4);
scene.add(hemi);

/* =====================================================================
   COURT GEOMETRY
   ===================================================================== */

const courtGroup = new THREE.Group();
scene.add(courtGroup);

// === COURT FLOOR ===
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x1e6091,
  roughness: 0.65,
  metalness: 0.05
});
const floorGeo = new THREE.PlaneGeometry(COURT_W, COURT_L);
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI / 2;
floor.receiveShadow = true;
courtGroup.add(floor);

// === SURROUNDING GROUND (darker, makes court pop) ===
const surroundGeo = new THREE.PlaneGeometry(60, 60);
const surroundMat = new THREE.MeshStandardMaterial({
  color: 0x0a0e14,
  roughness: 0.95
});
const surround = new THREE.Mesh(surroundGeo, surroundMat);
surround.rotation.x = -Math.PI / 2;
surround.position.y = -0.01;
surround.receiveShadow = true;
scene.add(surround);

// === COURT LINES ===
function makeLine(x1, z1, x2, z2, width = 0.05, color = 0xf4f1e8) {
  const length = Math.hypot(x2 - x1, z2 - z1);
  const lineGeo = new THREE.PlaneGeometry(length, width);
  const lineMat = new THREE.MeshBasicMaterial({ color: color });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.rotation.x = -Math.PI / 2;
  line.position.set((x1 + x2) / 2, 0.005, (z1 + z2) / 2);
  line.rotation.z = -Math.atan2(z2 - z1, x2 - x1);
  return line;
}

// Outer baseline + sidelines (the perimeter)
courtGroup.add(makeLine(-COURT_W/2, -COURT_L/2, COURT_W/2, -COURT_L/2, 0.07));
courtGroup.add(makeLine(-COURT_W/2, COURT_L/2, COURT_W/2, COURT_L/2, 0.07));
courtGroup.add(makeLine(-COURT_W/2, -COURT_L/2, -COURT_W/2, COURT_L/2, 0.07));
courtGroup.add(makeLine(COURT_W/2, -COURT_L/2, COURT_W/2, COURT_L/2, 0.07));

// Service lines
courtGroup.add(makeLine(-COURT_W/2, -SERVICE_LINE_DIST, COURT_W/2, -SERVICE_LINE_DIST));
courtGroup.add(makeLine(-COURT_W/2, SERVICE_LINE_DIST, COURT_W/2, SERVICE_LINE_DIST));

// Center service line (between service lines, only)
courtGroup.add(makeLine(0, -SERVICE_LINE_DIST, 0, SERVICE_LINE_DIST));

// === NET ===
const netGroup = new THREE.Group();
scene.add(netGroup);

// Net mesh - using a plane with a procedural texture
const netCanvas = document.createElement('canvas');
netCanvas.width = 512;
netCanvas.height = 64;
const ctx = netCanvas.getContext('2d');
ctx.fillStyle = 'rgba(0,0,0,0)';
ctx.fillRect(0, 0, 512, 64);
ctx.strokeStyle = 'rgba(220,220,220,0.85)';
ctx.lineWidth = 1.2;
for (let x = 0; x < 512; x += 6) {
  ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 64); ctx.stroke();
}
for (let y = 0; y < 64; y += 6) {
  ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(512, y); ctx.stroke();
}
const netTex = new THREE.CanvasTexture(netCanvas);
netTex.wrapS = THREE.RepeatWrapping;
netTex.wrapT = THREE.RepeatWrapping;

const netMat = new THREE.MeshBasicMaterial({
  map: netTex,
  transparent: true,
  side: THREE.DoubleSide,
  opacity: 0.85
});
const netGeo = new THREE.PlaneGeometry(COURT_W + 0.4, NET_H);
const net = new THREE.Mesh(netGeo, netMat);
net.position.y = NET_H / 2;
net.position.z = 0;
netGroup.add(net);

// Net top band (white)
const netBandGeo = new THREE.BoxGeometry(COURT_W + 0.4, 0.06, 0.04);
const netBandMat = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.4 });
const netBand = new THREE.Mesh(netBandGeo, netBandMat);
netBand.position.set(0, NET_H, 0);
netGroup.add(netBand);

// Net posts
const postGeo = new THREE.CylinderGeometry(0.08, 0.08, NET_H + 0.1, 8);
const postMat = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.7, roughness: 0.3 });
const postL = new THREE.Mesh(postGeo, postMat);
postL.position.set(-COURT_W/2 - 0.2, (NET_H + 0.1) / 2, 0);
postL.castShadow = true;

function createPlayer(label, teamColor, accentColor) {
  const group = new THREE.Group();

  // === MAIN BODY — slim, athletic, no head ===
  // Build a single elongated capsule-like silhouette using merged geometry feel.
  // We use a tapered cone-cylinder combo so it looks like a streamlined player.

  const torsoMat = new THREE.MeshStandardMaterial({
    color: teamColor,
    roughness: 0.35,
    metalness: 0.15,
    emissive: teamColor,
    emissiveIntensity: 0.04
  });

  const accentMat = new THREE.MeshStandardMaterial({
    color: accentColor,
    roughness: 0.3,
    metalness: 0.3,
    emissive: accentColor,
    emissiveIntensity: 0.25
  });

  // Lower body — wider at hips, narrower at base
  const lowerGeo = new THREE.CylinderGeometry(0.22, 0.18, 0.9, 16);
  const lower = new THREE.Mesh(lowerGeo, torsoMat);
  lower.position.y = 0.45;
  lower.castShadow = true;
  group.add(lower);

  // Upper body — broader shoulders, narrower waist (inverted cone for athletic look)
  const upperGeo = new THREE.CylinderGeometry(0.32, 0.24, 0.75, 16);
  const upper = new THREE.Mesh(upperGeo, torsoMat);
  upper.position.y = 1.3;
  upper.castShadow = true;
  group.add(upper);

  // Top dome — replaces the head with a smooth cap (no face)
  const topGeo = new THREE.SphereGeometry(0.32, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
  const top = new THREE.Mesh(topGeo, torsoMat);
  top.position.y = 1.67;
  top.castShadow = true;
  group.add(top);

  // === ACCENT BAND — diagonal sash on the shoulder (team identifier) ===
  const sashGeo = new THREE.TorusGeometry(0.31, 0.025, 8, 32, Math.PI * 1.4);
  const sash = new THREE.Mesh(sashGeo, accentMat);
  sash.position.y = 1.5;
  sash.rotation.x = Math.PI / 2;
  sash.rotation.y = Math.PI * 0.3;
  group.add(sash);

  // === SHOULDER ACCENT RING (top, like a halo seen from above) ===
  const collarGeo = new THREE.TorusGeometry(0.32, 0.02, 8, 24);
  const collar = new THREE.Mesh(collarGeo, accentMat);
  collar.position.y = 1.65;
  collar.rotation.x = Math.PI / 2;
  group.add(collar);

  // === DIRECTION INDICATOR — triangle arrow at feet ===
  // Shows which way the player is facing — pure tactical signal
  const arrowShape = new THREE.Shape();
  arrowShape.moveTo(0, 0.5);
  arrowShape.lineTo(-0.25, -0.2);
  arrowShape.lineTo(0, -0.05);
  arrowShape.lineTo(0.25, -0.2);
  arrowShape.lineTo(0, 0.5);
  const arrowGeo = new THREE.ShapeGeometry(arrowShape);
  const arrowMat = new THREE.MeshBasicMaterial({
    color: accentColor,
    transparent: true,
    opacity: 0.85,
    side: THREE.DoubleSide
  });
  const arrow = new THREE.Mesh(arrowGeo, arrowMat);
  arrow.rotation.x = -Math.PI / 2;
  arrow.position.y = 0.025;
  arrow.position.z = 0.15; // slightly in front of player
  group.add(arrow);

  // === FLOOR RING — subtle position marker ===
  const ringGeo = new THREE.RingGeometry(0.42, 0.5, 64);
  const ringMat = new THREE.MeshBasicMaterial({
    color: accentColor,
    transparent: true,
    opacity: 0.55,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.y = 0.015;
  group.add(ring);

  // Inner ring (thinner, brighter — gives it depth)
  const innerRingGeo = new THREE.RingGeometry(0.36, 0.38, 64);
  const innerRingMat = new THREE.MeshBasicMaterial({
    color: accentColor,
    transparent: true,
    opacity: 0.4,
    side: THREE.DoubleSide
  });
  const innerRing = new THREE.Mesh(innerRingGeo, innerRingMat);
  innerRing.rotation.x = -Math.PI / 2;
  innerRing.position.y = 0.015;
  group.add(innerRing);

  // === LABEL — high-contrast, large, team-coded ===
  const labelCanvas = document.createElement('canvas');
  labelCanvas.width = 320;
  labelCanvas.height = 140;
  const lctx = labelCanvas.getContext('2d');

  // Larger pill
  const pillW = 200;
  const pillH = 86;
  const pillX = (320 - pillW) / 2;
  const pillY = (140 - pillH) / 2;
  const radius = 12;
  const accentHex = '#' + accentColor.toString(16).padStart(6, '0');

  // Drop shadow underneath for separation from court
  lctx.shadowColor = 'rgba(0, 0, 0, 0.6)';
  lctx.shadowBlur = 12;
  lctx.shadowOffsetY = 4;

  // Solid dark background with rounded corners
  lctx.fillStyle = '#0a0e14';
  lctx.beginPath();
  lctx.moveTo(pillX + radius, pillY);
  lctx.lineTo(pillX + pillW - radius, pillY);
  lctx.quadraticCurveTo(pillX + pillW, pillY, pillX + pillW, pillY + radius);
  lctx.lineTo(pillX + pillW, pillY + pillH - radius);
  lctx.quadraticCurveTo(pillX + pillW, pillY + pillH, pillX + pillW - radius, pillY + pillH);
  lctx.lineTo(pillX + radius, pillY + pillH);
  lctx.quadraticCurveTo(pillX, pillY + pillH, pillX, pillY + pillH - radius);
  lctx.lineTo(pillX, pillY + radius);
  lctx.quadraticCurveTo(pillX, pillY, pillX + radius, pillY);
  lctx.fill();

  // Reset shadow before drawing other elements
  lctx.shadowColor = 'transparent';
  lctx.shadowBlur = 0;
  lctx.shadowOffsetY = 0;

  // Thick colored left bar — instant team identifier
  lctx.fillStyle = accentHex;
  lctx.fillRect(pillX, pillY + radius / 2, 10, pillH - radius);

  // Thin top + bottom accent bands (subtle frame)
  lctx.fillStyle = accentHex;
  lctx.fillRect(pillX + 10, pillY, pillW - 10, 2);
  lctx.fillRect(pillX + 10, pillY + pillH - 2, pillW - 10, 2);

  // Large white text
  lctx.fillStyle = '#ffffff';
  lctx.font = '700 56px "Bebas Neue", "JetBrains Mono", sans-serif';
  lctx.textAlign = 'center';
  lctx.textBaseline = 'middle';
  lctx.letterSpacing = '3px';
  lctx.fillText(label, 160, 73);

  const labelTex = new THREE.CanvasTexture(labelCanvas);
  labelTex.minFilter = THREE.LinearFilter;
  labelTex.magFilter = THREE.LinearFilter;
  labelTex.anisotropy = 4;
  const labelMat = new THREE.SpriteMaterial({
    map: labelTex,
    transparent: true,
    depthTest: false,  // always on top of 3D scene
    depthWrite: false
  });
  const labelSprite = new THREE.Sprite(labelMat);
  // Much bigger so it's readable from any camera angle
  labelSprite.scale.set(1.6, 0.7, 1);
  labelSprite.position.y = 2.5;
  labelSprite.renderOrder = 999;
  group.add(labelSprite);

  // Store references for animation
  group.userData.body = upper;
  group.userData.ring = ring;
  group.userData.innerRing = innerRing;
  group.userData.label = labelSprite;
  group.userData.arrow = arrow;

  return group;
}

function setCamera(preset, instant = false) {
  const p = CAM_PRESETS[preset];

    camLerpStart = performance.now();

}

/* =====================================================================
   ORBIT CONTROLS — simple custom (no extra import)
   ===================================================================== */

let isDraggingCam = false;
let lastMouseX = 0, lastMouseY = 0;
let camAzim = Math.atan2(camera.position.x, camera.position.z);
let camElev = Math.asin(camera.position.y / camera.position.length());
let camDist = camera.position.length();
let userControl = false;

function updateCameraFromOrbit() {
  camera.position.x = camDist * Math.cos(camElev) * Math.sin(camAzim);
  camera.position.y = camDist * Math.sin(camElev);
  camera.position.z = camDist * Math.cos(camElev) * Math.cos(camAzim);
  camera.lookAt(currentTarget);
}

renderer.domElement.addEventListener('pointerdown', (e) => {
  if (sandboxActive && raycastPlayer(e)) return;
  isDraggingCam = true;
  userControl = true;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  renderer.domElement.style.cursor = 'grabbing';
});

window.addEventListener('pointerup', () => {
  isDraggingCam = false;
  renderer.domElement.style.cursor = '';
});

window.addEventListener('pointermove', (e) => {
  if (!isDraggingCam) return;
  if (sandboxActive && draggingPlayer) return;
  const dx = e.clientX - lastMouseX;
  const dy = e.clientY - lastMouseY;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  camAzim -= dx * 0.005;
  camElev = Math.max(0.05, Math.min(Math.PI / 2 - 0.05, camElev + dy * 0.005));
  updateCameraFromOrbit();
});

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDist = Math.max(8, Math.min(50, camDist + e.deltaY * 0.02));
  updateCameraFromOrbit();
}, { passive: false });

// Touch
let touchStartDist = 0;
renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    touchStartDist = Math.hypot(dx, dy);
  }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const newDist = Math.hypot(dx, dy);
    camDist = Math.max(8, Math.min(50, camDist - (newDist - touchStartDist) * 0.05));
    touchStartDist = newDist;
    updateCameraFromOrbit();
  }
}, { passive: true });

/* =====================================================================
   ANIMATION ENGINE — CONTINUOUS TIMELINE
   The whole rally is one uninterrupted film. We pre-build a timeline
   with all segments stitched together, then a single render-loop driver
   advances time linearly. No setTimeout pauses, no per-step resets.
   ===================================================================== */

// Sandbox-specific tween queue (used by sandbox presets only)
const animations = [];

let currentStrategy = null;
let currentStepIndex = 0;
let isPlaying = false;
let playSpeed = 1;

let timeline = null;            // pre-built list of segments
let playbackStartTime = 0;      // performance.now() when play started

const SEGMENT_DURATION = 2.8;   // seconds per phase at 1× speed
// Within each segment:
//   0—0.15 = anticipation (still on previous position, small pre-hit pause)
//   0.15—0.65 = ball flight (hit + travel through the air)
//   0.30—1.0 = player reposition to new spot (starts mid-flight, ends after)
// Key principle: ball leaves FIRST from striker's location, players reposition AFTER.
const BALL_PHASE_START = 0.15;
const BALL_PHASE_END = 0.65;
const PLAYER_MOVE_START = 0.30;
const PLAYER_MOVE_END = 1.0;

function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function easeInOutSine(t)  { return -(Math.cos(Math.PI * t) - 1) / 2; }
function easeOutExpo(t)    { return t === 1 ? 1 : 1 - Math.pow(2, -10 * t); }
function easeInQuad(t)     { return t * t; }

function getPeakHeight(arcType, from, to) {
  const dist = Math.hypot(to.x - from.x, to.z - from.z);
  switch (arcType) {
    // Big arcs — high lobs that nearly touch ceiling height
    case 'high-lob': return Math.max(5.5, dist * 0.45);
    case 'lob':      return Math.max(3.0, dist * 0.28);
    case 'por-tres': return Math.max(4.5, dist * 0.35);
    // Mid-height attack shots that peak and dive
    case 'bandeja':  return Math.max(2.2, dist * 0.16);
    case 'vibora':   return Math.max(2.6, dist * 0.19);
    // Chiquita — soft float over the net at net-height
    case 'chiquita': return Math.max(1.4, dist * 0.07);
    // Flat shots — barely lift off
    case 'serve':    return Math.max(0.9, dist * 0.08);
    case 'drive':    return Math.max(0.25, dist * 0.025);
    case 'volley':   return Math.max(0.15, dist * 0.02);
    default:         return Math.max(1.5, dist * 0.1);
  }
}

function buildTimeline(strategy) {
  const segments = [];
  let cumulative = 0;

  for (let i = 0; i < strategy.steps.length; i++) {
    const step = strategy.steps[i];
    const prevStep = i > 0 ? strategy.steps[i - 1] : step;

    const playerPaths = {};
    ['A1', 'A2', 'B1', 'B2'].forEach(id => {
      const fromPos = prevStep.players[id] || step.players[id];
      const toPos = step.players[id] || fromPos;
      playerPaths[id] = {
        from: { x: fromPos.x, z: fromPos.z },
        to:   { x: toPos.x,   z: toPos.z }
      };
    });

    const prevBall = prevStep.ball || { x: 0, y: 0.5, z: 0 };
    let ballFrom = i === 0 ? prevBall : (prevStep.ball || prevBall);
    const ballTo = step.ball || ballFrom;

    // UNIVERSAL SAFEGUARD: for any active shot (not idle), ensure the ball
    // starts at the striker's position. If the previous-segment ball position
    // is far from any player, snap it to the closest one.
    // This prevents the ball from appearing in mid-air when it should be in a hand.
    const isActiveShot = step.ballArc && step.ballArc !== 'idle';
    if (isActiveShot) {
      let closestPos = null, closestDist = Infinity;
      ['A1','A2','B1','B2'].forEach(id => {
        // Use the player position at the START of this segment (= previous step's position)
        const p = prevStep.players[id] || step.players[id];
        const d = Math.hypot(p.x - ballFrom.x, p.z - ballFrom.z);
        if (d < closestDist) { closestDist = d; closestPos = p; }
      });
      // If the ball is more than 1.5m from the nearest player, snap it.
      // 1.5m is roughly "arm's reach" tolerance — beyond that, ball must be in someone's hand.
      if (closestPos && closestDist > 1.5) {
        // Use a sensible hit-height depending on shot type
        let hitY = 0.9; // default chest-height
        if (step.ballArc === 'bandeja' || step.ballArc === 'vibora' || step.ballArc === 'por-tres') hitY = 1.9;
        else if (step.ballArc === 'lob' || step.ballArc === 'high-lob') hitY = 0.7;
        else if (step.ballArc === 'chiquita' || step.ballArc === 'drive') hitY = 0.6;
        else if (step.ballArc === 'volley') hitY = 1.0;
        else if (step.ballArc === 'serve') hitY = 0.9;
        ballFrom = { x: closestPos.x, y: hitY, z: closestPos.z };
      }
    }

    segments.push({
      stepIndex: i,
      text: step.text,
      startTime: cumulative,
      endTime: cumulative + SEGMENT_DURATION,
      duration: SEGMENT_DURATION,
      playerPaths,
      ballFrom: { x: ballFrom.x, y: ballFrom.y || 0.5, z: ballFrom.z },
      ballTo:   { x: ballTo.x,   y: ballTo.y   || 0.5, z: ballTo.z },
      ballArc:  step.ballArc || 'idle'
    });
    cumulative += SEGMENT_DURATION;
  }
  return { segments, totalDuration: cumulative };
}

function getSegmentAt(time) {
  if (!timeline) return null;
  for (const seg of timeline.segments) {
    if (time >= seg.startTime && time < seg.endTime) return seg;
  }
  return timeline.segments[timeline.segments.length - 1];
}

// Track the *previous* segment's end-state for ball so we can interpolate
// seamlessly across segment boundaries without any stops.
function applyTimelineState(tlTime) {
  const seg = getSegmentAt(tlTime);
  if (!seg) return;
  const localT = Math.max(0, Math.min(1, (tlTime - seg.startTime) / seg.duration));

  // === PLAYERS — reposition AFTER the ball is hit ===
  // Real padel rhythm:
  //   1. Player stands ready at previous position (0—15%: anticipation)
  //   2. Ball gets hit and flies (15—65%)
  //   3. Player moves to next position to recover/prepare (30—100%)
  // The slight overlap (30—65%) is natural — pros start moving the moment
  // the ball leaves the racket, not after.
  ['A1', 'A2', 'B1', 'B2'].forEach(id => {
    const path = seg.playerPaths[id];
    const dx = path.to.x - path.from.x;
    const dz = path.to.z - path.from.z;
    const moveDist = Math.hypot(dx, dz);

    // Player movement happens in PLAYER_MOVE_START to PLAYER_MOVE_END
    let pT;
    if (localT < PLAYER_MOVE_START) {
      pT = 0;
    } else if (localT >= PLAYER_MOVE_END) {
      pT = 1;
    } else {
      const moveLocal = (localT - PLAYER_MOVE_START) / (PLAYER_MOVE_END - PLAYER_MOVE_START);
      pT = easeInOutCubic(moveLocal);
    }
    const x = path.from.x + dx * pT;
    const z = path.from.z + dz * pT;
    const player = players[id];

    player.position.x = x;
    player.position.z = z;

    // Subtle running bounce when actively moving
    const isMoving = moveDist > 0.3 && localT >= PLAYER_MOVE_START && localT < PLAYER_MOVE_END - 0.05;
    if (isMoving) {
      const moveLocal = (localT - PLAYER_MOVE_START) / (PLAYER_MOVE_END - PLAYER_MOVE_START);
      const stepCycle = moveLocal * moveDist * 1.6;
      player.position.y = Math.abs(Math.sin(stepCycle * Math.PI * 2)) * 0.05;
    } else {
      // Settle smoothly to ground
      player.position.y *= 0.82;
    }

    // Rotate to face direction of movement — only while moving
    if (moveDist > 0.1 && localT >= PLAYER_MOVE_START && localT < PLAYER_MOVE_END) {
      const targetRot = Math.atan2(dx, dz);
      let dr = targetRot - player.rotation.y;
      while (dr >  Math.PI) dr -= Math.PI * 2;
      while (dr < -Math.PI) dr += Math.PI * 2;
      player.rotation.y += dr * 0.18;
    }
  });

  // === BALL — flies from previous segment's end to this segment's end ===
  // Continuous: no stops between segments. The ball is always in motion
  // (except during 'idle' segments).
  let bx, by, bz;

  if (seg.ballArc === 'idle') {
    // Hold position with subtle bob
    bx = seg.ballFrom.x;
    bz = seg.ballFrom.z;
    by = Math.max(0.12, seg.ballFrom.y) + Math.sin(tlTime * 2.5) * 0.015;
  } else {
    // Ball flight happens between BALL_PHASE_START and BALL_PHASE_END.
    // Before BALL_PHASE_START: ball is at striker's position (pre-hit hold).
    // After BALL_PHASE_END: ball is at destination (post-hit, waiting for next phase).
    let ballT;
    if (localT < BALL_PHASE_START) {
      ballT = 0;
    } else if (localT >= BALL_PHASE_END) {
      ballT = 1;
    } else {
      ballT = (localT - BALL_PHASE_START) / (BALL_PHASE_END - BALL_PHASE_START);
    }

    // Horizontal progress easing — how the ball travels in X/Z
    // Drives/volleys/serves: fast linear (energy from the hit), no slow-down
    // Lobs: smooth sine
    // Chiquita: starts fast, decelerates (it dips and dies)
    let eB;
    if (seg.ballArc === 'drive' || seg.ballArc === 'volley') {
      eB = easeOutExpo(ballT);
    } else if (seg.ballArc === 'serve') {
      eB = 1 - Math.pow(1 - ballT, 2.2); // smooth deceleration
    } else if (seg.ballArc === 'chiquita') {
      eB = 1 - Math.pow(1 - ballT, 1.8); // slight deceleration toward feet
    } else if (seg.ballArc === 'bandeja' || seg.ballArc === 'vibora') {
      eB = easeOutExpo(ballT); // attack shot, fast initial
    } else {
      eB = easeInOutSine(ballT); // lobs, neutral
    }

    bx = seg.ballFrom.x + (seg.ballTo.x - seg.ballFrom.x) * eB;
    bz = seg.ballFrom.z + (seg.ballTo.z - seg.ballFrom.z) * eB;
    const baseY = seg.ballFrom.y + (seg.ballTo.y - seg.ballFrom.y) * eB;

    // === SHOT-SPECIFIC HEIGHT PROFILE ===
    // Each shot has its own "feel" — peak height + when the peak occurs +
    // how the trajectory looks (flat, dipping, arcing, falling).
    const peakH = getPeakHeight(seg.ballArc, seg.ballFrom, seg.ballTo);
    let arcOffset;

    switch (seg.ballArc) {
      case 'drive':
      case 'volley': {
        // Nearly flat — slight ground-skimming arc. Drive/volley travel
        // almost horizontally. Tiny bump in the middle for realism.
        arcOffset = peakH * 4 * eB * (1 - eB);
        break;
      }
      case 'serve': {
        // Low underhand serve — peak at ~40%, gentle descent.
        // The ball must clear the net and land in the service box.
        const t = eB;
        arcOffset = peakH * Math.sin(Math.PI * Math.pow(t, 0.85));
        break;
      }
      case 'chiquita': {
        // Sliced soft ball: peaks early (just over the net), then DIPS
        // sharply toward opponent's feet. The signature "dying ball".
        // Peak at ~30% of the flight, then steep descent.
        const t = eB;
        if (t < 0.30) {
          // Quick rise to peak
          const k = t / 0.30;
          arcOffset = peakH * Math.sin(k * Math.PI * 0.5);
        } else {
          // Sharp dip — uses a steeper falloff curve
          const k = (t - 0.30) / 0.70;
          arcOffset = peakH * Math.pow(1 - k, 1.8);
        }
        break;
      }
      case 'bandeja': {
        // Sliced overhead. Peak early (~30%), then descends with slice spin
        // toward opponent's back zone. Asymmetric — rises fast, falls slow.
        const t = eB;
        if (t < 0.30) {
          const k = t / 0.30;
          arcOffset = peakH * Math.sin(k * Math.PI * 0.5);
        } else {
          const k = (t - 0.30) / 0.70;
          arcOffset = peakH * Math.pow(1 - k, 1.4);
        }
        break;
      }
      case 'vibora': {
        // Like bandeja but more aggressive — side-spin, sharper descent.
        // Peak even earlier (~25%), then snaps down.
        const t = eB;
        if (t < 0.25) {
          const k = t / 0.25;
          arcOffset = peakH * Math.sin(k * Math.PI * 0.5);
        } else {
          const k = (t - 0.25) / 0.75;
          arcOffset = peakH * Math.pow(1 - k, 2.0);
        }
        break;
      }
      case 'lob':
      case 'high-lob': {
        // Symmetric parabola — true upward arc. High-lob is taller.
        // Use a slightly compressed top so the ball hangs at apex briefly.
        const t = eB;
        // Modified parabola: rise + slight hang + descent
        arcOffset = peakH * Math.sin(Math.PI * t);
        // For high-lob, add slight asymmetry (slower rise, faster fall = realistic gravity)
        if (seg.ballArc === 'high-lob') {
          if (t > 0.5) {
            // Steeper descent in second half
            const fallT = (t - 0.5) * 2;
            arcOffset = peakH * (1 - Math.pow(fallT, 1.6));
          }
        }
        break;
      }
      case 'por-tres': {
        // Lob that exits through the side cage — high, fast, escapes.
        // Tall asymmetric arc.
        const t = eB;
        if (t < 0.45) {
          const k = t / 0.45;
          arcOffset = peakH * Math.sin(k * Math.PI * 0.5);
        } else {
          const k = (t - 0.45) / 0.55;
          arcOffset = peakH * Math.pow(1 - k, 1.3);
        }
        break;
      }
      default: {
        arcOffset = peakH * 4 * eB * (1 - eB);
      }
    }

    by = baseY + arcOffset;

    // === HIT PULSE on the striker ===
    // Around ballT=0..0.18 we flash the closest player's inner ring to
    // visually mark "this player just hit the ball". Subtle but powerful.
    if (ballT >= 0 && ballT < 0.18) {
      // Find closest player to ballFrom (the hitter)
      let closestId = null, closestDist = Infinity;
      ['A1','A2','B1','B2'].forEach(id => {
        const p = players[id].position;
        const d = Math.hypot(p.x - seg.ballFrom.x, p.z - seg.ballFrom.z);
        if (d < closestDist) { closestDist = d; closestId = id; }
      });
      if (closestId && closestDist < 3.5) {
        const ring = players[closestId].userData.innerRing;
        const pulseT = ballT / 0.18; // 0..1 across the pulse window
        const scale = 1 + (1 - pulseT) * 0.9; // 1.9 -> 1.0
        ring.scale.set(scale, scale, 1);
        ring.material.opacity = 0.4 + (1 - pulseT) * 0.5; // bright -> normal
      }
    } else {
      // Smoothly reset all inner rings to default
      ['A1','A2','B1','B2'].forEach(id => {
        const ring = players[id].userData.innerRing;
        ring.scale.lerp(new THREE.Vector3(1, 1, 1), 0.18);
        ring.material.opacity += (0.4 - ring.material.opacity) * 0.18;
      });
    }

    // Tiny anticipation: ball "shrinks" a fraction before flight starts
    if (ballT > 0 && ballT < 0.05) {
      ballGroup.scale.setScalar(0.85 + ballT * 3);
    } else {
      ballGroup.scale.lerp(new THREE.Vector3(1, 1, 1), 0.2);
    }
  }

  setBallPosition(bx, by, bz);

  if (seg.ballArc !== 'idle' && localT > BALL_PHASE_START) {
    pushTrailPoint(bx, by, bz);
  }

  zoneOverlays.visible = currentStrategy?.id === 'three-zones';

  // Cinematic camera — smooth follow with inertia, no per-frame snap
  if (activeCam === 'cinematic') {
    const tCam = tlTime * 0.3;
    const camTarget = new THREE.Vector3(bx * 0.4, 1, bz * 0.4);
    const camPos = new THREE.Vector3(
      bx * 0.3 + Math.cos(tCam) * 14,
      4 + Math.sin(tCam * 0.5) * 1,
      bz * 0.3 + Math.sin(tCam) * 14
    );
    camera.position.lerp(camPos, 0.04);
    currentTarget.lerp(camTarget, 0.04);
    camera.lookAt(currentTarget);
  }

  if (seg.stepIndex !== currentStepIndex) {
    currentStepIndex = seg.stepIndex;
    setStepText(seg.text, seg.stepIndex, timeline.segments.length);
  }
  updateProgress(timeline.segments.length, seg.stepIndex);
}

// === Continuous trail buffer ===
const TRAIL_MAX = 220;
const trailPositions = new Float32Array(TRAIL_MAX * 3);
let trailLength = 0;
const trailGeoCont = new THREE.BufferGeometry();
trailGeoCont.setAttribute('position', new THREE.BufferAttribute(trailPositions, 3));
const trailMatCont = new THREE.LineBasicMaterial({ color: 0xd4ff00, transparent: true, opacity: 0.6 });
const trailLineCont = new THREE.Line(trailGeoCont, trailMatCont);
trailLineCont.frustumCulled = false;
scene.add(trailLineCont);

function pushTrailPoint(x, y, z) {
  if (trailLength > 0) {
    const ix = (trailLength - 1) * 3;
    const dx = x - trailPositions[ix];
    const dy = y - trailPositions[ix + 1];
    const dz = z - trailPositions[ix + 2];
    if (dx * dx + dy * dy + dz * dz < 0.0009) return;
  }
  if (trailLength >= TRAIL_MAX) {
    for (let i = 0; i < (TRAIL_MAX - 1) * 3; i++) trailPositions[i] = trailPositions[i + 3];
    trailLength = TRAIL_MAX - 1;
  }
  trailPositions[trailLength * 3]     = x;
  trailPositions[trailLength * 3 + 1] = y;
  trailPositions[trailLength * 3 + 2] = z;
  trailLength++;
  trailGeoCont.setDrawRange(0, trailLength);
  trailGeoCont.attributes.position.needsUpdate = true;
}

function clearBallTrail() {
  trailLength = 0;
  trailGeoCont.setDrawRange(0, 0);
}

function setStepText(text, idx, total) {
  const stepText = document.getElementById('step-text');
  stepText.style.transition = 'opacity 0.25s';
  stepText.style.opacity = '0';
  setTimeout(() => {
    stepText.textContent = text;
    document.getElementById('step-num').textContent = `FASE ${idx + 1}/${total}`;
    stepText.style.opacity = '1';
  }, 200);
}

function updateProgress(total, currentIdx) {
  const container = document.getElementById('step-progress');
  if (container.children.length !== total) {
    container.innerHTML = '';
    for (let i = 0; i < total; i++) {
      const span = document.createElement('span');
      span.addEventListener('click', () => seekToStep(i));
      container.appendChild(span);
    }
  }
  Array.from(container.children).forEach((span, i) => {
    span.classList.toggle('played', i < currentIdx);
    span.classList.toggle('current', i === currentIdx);
  });
}

function seekToStep(idx) {
  if (!timeline) return;
  const seg = timeline.segments[idx];
  if (!seg) return;
  playbackStartTime = performance.now() - (seg.startTime * 1000) / playSpeed;
  currentStepIndex = idx;
  clearBallTrail();
  applyTimelineState(seg.startTime + 0.001);
}

// Set which icon is shown inside the big play button
function setPlayIcon(state) {
  const btn = document.getElementById('play-btn');
  const playIcon = btn.querySelector('.play-icon-play');
  const pauseIcon = btn.querySelector('.play-icon-pause');
  const replayIcon = btn.querySelector('.play-icon-replay');
  playIcon.style.display = state === 'play' ? '' : 'none';
  pauseIcon.style.display = state === 'pause' ? '' : 'none';
  replayIcon.style.display = state === 'replay' ? '' : 'none';
  // Idle pulse glow only when showing play and not yet started
  btn.classList.toggle('idle', state === 'play' && !timeline);
}

function playStrategy() {
  if (!currentStrategy) return;
  if (isPlaying) {
    stopPlayback();
    return;
  }
  isPlaying = true;
  setPlayIcon('pause');
  if (!timeline) timeline = buildTimeline(currentStrategy);
  clearBallTrail();
  playbackStartTime = performance.now();
  currentStepIndex = -1;
}

function stopPlayback(forceState) {
  isPlaying = false;
  if (forceState) {
    setPlayIcon(forceState);
    return;
  }
  // Show replay icon if we played all the way through, otherwise play
  const finishedAtEnd = timeline &&
    (performance.now() - playbackStartTime) / 1000 * playSpeed >= timeline.totalDuration - 0.05;
  setPlayIcon(finishedAtEnd ? 'replay' : 'play');
}

document.getElementById('play-btn').addEventListener('click', () => {
  if (isPlaying) {
    stopPlayback();
  } else {
    // If we finished (replay icon showing), restart from beginning
    if (timeline) {
      const replayIcon = document.querySelector('.play-icon-replay');
      if (replayIcon.style.display !== 'none') {
        // Reset timeline to start
        playbackStartTime = performance.now();
      }
    }
    playStrategy();
  }
});

document.querySelectorAll('.speed-toggle button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.speed-toggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const newSpeed = parseFloat(btn.dataset.speed);
    if (isPlaying && timeline) {
      // Adjust start time so we keep current timeline position when speed changes
      const elapsedMs = performance.now() - playbackStartTime;
      const tlTime = (elapsedMs / 1000) * playSpeed;
      playSpeed = newSpeed;
      playbackStartTime = performance.now() - (tlTime * 1000) / playSpeed;
    } else {
      playSpeed = newSpeed;
    }
  });
});

/* =====================================================================
   STRATEGY LIST + FILTERS
   ===================================================================== */

const filters = { level: 'all', intent: 'all' };

function renderStrategyList() {
  const list = document.getElementById('strat-list');
  const filtered = STRATEGIES.filter(s => {
    if (filters.level !== 'all' && s.level !== filters.level) return false;
    if (filters.intent !== 'all' && s.intent !== filters.intent) return false;
    return true;
  });

  document.getElementById('strat-count').textContent = filtered.length.toString().padStart(2, '0');

  if (filtered.length === 0) {
    list.innerHTML = '<div style="padding: 20px; color: var(--text-faint); font-style: italic; text-align: center; font-size: 12px;">Geen strategieën met deze filters.</div>';
    return;
  }

  list.innerHTML = filtered.map(s => `
    <div class="strat-item ${currentStrategy?.id === s.id ? 'active' : ''}" data-id="${s.id}">
      <div class="strat-item-name">${s.name} <em>${s.spanish}</em></div>
      <div class="strat-item-meta">
        <span class="lvl ${s.level}">${
          s.level === 'beginner' ? 'Beg.' :
          s.level === 'intermediate' ? 'Gevr.' : 'Comp.'
        }</span>
        <span>${s.intent === 'offensive' ? 'aanval' : s.intent === 'defensive' ? 'verdediging' : 'positie'}</span>
      </div>
    </div>
  `).join('');

  list.querySelectorAll('.strat-item').forEach(el => {
    el.addEventListener('click', () => loadStrategy(el.dataset.id));
  });
}

document.querySelectorAll('.chips').forEach(group => {
  const filterType = group.dataset.filter;
  group.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => {
      group.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      filters[filterType] = chip.dataset.val;
      renderStrategyList();
    });
  });
});

function loadStrategy(id) {
  const s = STRATEGIES.find(s => s.id === id);
  if (!s) return;
  stopPlayback('play');
  currentStrategy = s;
  timeline = buildTimeline(s);
  clearBallTrail();
  // Set initial state without animation
  const seg = timeline.segments[0];
  const step0 = s.steps[0];
  ['A1','A2','B1','B2'].forEach(id => {
    const path = seg.playerPaths[id];
    players[id].position.set(path.from.x, 0, path.from.z);
  });
  // Use the step's own ball position directly to avoid fallback to (0,0.5,0)
  const initialBall = step0.ball || { x: 0, y: 0.5, z: 0 };
  setBallPosition(initialBall.x, initialBall.y || 0.5, initialBall.z);
  currentStepIndex = 0;
  setStepText(seg.text, 0, timeline.segments.length);
  updateProgress(timeline.segments.length, 0);
  zoneOverlays.visible = s.id === 'three-zones';

  renderStrategyList();
  updateDetailPanel(s);
}

function updateDetailPanel(s) {
  document.getElementById('strat-title').textContent = s.name;
  document.getElementById('strat-spanish').textContent = s.spanish;
  document.getElementById('strat-summary').textContent = s.summary;
  document.getElementById('d-when').innerHTML = s.when.map(w => `<li>${w}</li>`).join('');
  document.getElementById('d-shots').innerHTML = s.shots.map(sh => `<span>${sh}</span>`).join('');
  document.getElementById('d-mistakes').innerHTML = s.mistakes.map(m => `<li>${m}</li>`).join('');
  document.getElementById('d-tip').textContent = '"' + s.tip + '"';
}

   ===================================================================== */

let sandboxActive = false;

document.querySelectorAll('.mode-switch button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-switch button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const mode = btn.dataset.mode;
    document.body.className = `mode-${mode}`;
    sandboxActive = (mode === 'sandbox');
    if (sandboxActive) {
      stopPlayback();
      setupSandbox();
    } else {
      teardownSandbox();
    }
  });
});

function setupSandbox() {
  // Reset to a neutral starting formation
  const setup = { A1: { x: -2.5, z: -3 }, A2: { x: 2.5, z: -3 }, B1: { x: -2.5, z: 3 }, B2: { x: 2.5, z: 3 }, ball: { x: 0, y: 0.5, z: 0 } };
  ['A1','A2','B1','B2'].forEach(id => {
    players[id].position.set(setup[id].x, 0, setup[id].z);
  });
  setBallPosition(0, 0.5, 0);
  clearBallTrail();
  document.getElementById('strat-title').textContent = 'Sandbox';
  document.getElementById('strat-spanish').textContent = 'jouw tactiekboard';
  document.getElementById('strat-summary').textContent = 'Klik en sleep een speler om hun positie aan te passen. Bal sleept ook. Bouw je eigen formaties op.';
  document.getElementById('d-when').innerHTML = '<li>Verken aanvalsformaties</li><li>Test verdedigingsposities</li><li>Bouw set-plays voor je team</li>';
  document.getElementById('d-shots').innerHTML = '<span>Vrij spel</span>';
  document.getElementById('d-mistakes').innerHTML = '<li>Spelers te ver uit elkaar</li><li>Niemandsland tussen zones</li><li>Splitsing voor / achter</li>';
  document.getElementById('d-tip').textContent = '"Test elke positie: zou jouw paar deze gat-formatie kunnen verdedigen?"';
}

function teardownSandbox() {
  draggingPlayer = null;
  if (currentStrategy) loadStrategy(currentStrategy.id);
}

document.getElementById('sb-reset').addEventListener('click', setupSandbox);
document.getElementById('sb-preset-1').addEventListener('click', () => {
  const setup = { A1: POS.A_NET_L, A2: POS.A_NET_R, B1: POS.B_DEFEND_L, B2: POS.B_DEFEND_R, ball: { x: 0, y: 0.5, z: 0 } };
  applySandboxSetup(setup);
});
document.getElementById('sb-preset-2').addEventListener('click', () => {
  const setup = { A1: POS.A_DEFEND_L, A2: POS.A_DEFEND_R, B1: POS.B_NET_L, B2: POS.B_NET_R, ball: { x: 3, y: 0.5, z: -8 } };
  applySandboxSetup(setup);
});
document.getElementById('sb-preset-3').addEventListener('click', () => {
  const setup = { A1: POS.A_DEFEND_L, A2: POS.A_DEFEND_R, B1: { x: -2.5, z: 4 }, B2: { x: 2.5, z: 4 }, ball: { x: 3, y: 0.5, z: -8 } };
  applySandboxSetup(setup);
});

function applySandboxSetup(setup) {
  ['A1','A2','B1','B2'].forEach(id => {
    const p = setup[id];
    if (p) {
      const from = { x: players[id].position.x, y: 0, z: players[id].position.z };
      const start = performance.now();
      animations.push({
        update: (now) => {
          const t = Math.min(1, (now - start) / 600);
          const eased = easeInOutCubic(t);
          players[id].position.x = from.x + (p.x - from.x) * eased;
          players[id].position.z = from.z + (p.z - from.z) * eased;
          return t < 1;
        }
      });
    }
  });
  if (setup.ball) {
    const from = { x: ballGroup.position.x, y: ballGroup.position.y, z: ballGroup.position.z };
    const to = setup.ball;
    const start = performance.now();
    animations.push({
      update: (now) => {
        const t = Math.min(1, (now - start) / 600);
        const eased = easeInOutCubic(t);
        setBallPosition(
          from.x + (to.x - from.x) * eased,
          from.y + (to.y - from.y) * eased,
          from.z + (to.z - from.z) * eased
        );
        return t < 1;
      }
    });
  }
  clearBallTrail();
}

/* =====================================================================
   SANDBOX DRAGGING (raycasting onto ground plane)
   ===================================================================== */

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let draggingPlayer = null;
let dragOffset = new THREE.Vector3();

function raycastPlayer(e) {
  if (!sandboxActive) return null;
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
  mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check intersection with each player and ball
  const intersectables = [];
  Object.entries(players).forEach(([id, p]) => intersectables.push({ id, group: p, type: 'player' }));
  intersectables.push({ id: 'ball', group: ballGroup, type: 'ball' });

  for (const item of intersectables) {
    const meshes = [];
    item.group.traverse(o => { if (o.isMesh) meshes.push(o); });
    const hits = raycaster.intersectObjects(meshes, false);
    if (hits.length > 0) {
      draggingPlayer = item;
      // compute drag plane intersection at floor
      const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
      const intersect = new THREE.Vector3();
      raycaster.ray.intersectPlane(plane, intersect);
      dragOffset.copy(intersect).sub(item.group.position);
      dragOffset.y = 0;
      renderer.domElement.style.cursor = 'grabbing';
      return item;
    }
  }
  return null;
}

renderer.domElement.addEventListener('pointermove', (e) => {
  if (!sandboxActive) return;
  if (draggingPlayer) {
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const intersect = new THREE.Vector3();
    raycaster.ray.intersectPlane(plane, intersect);
    let newPos = intersect.sub(dragOffset);
    // Clamp to court area + a bit outside
    newPos.x = Math.max(-COURT_W/2 - 1, Math.min(COURT_W/2 + 1, newPos.x));
    newPos.z = Math.max(-COURT_L/2 - 1, Math.min(COURT_L/2 + 1, newPos.z));
    if (draggingPlayer.type === 'player') {
      draggingPlayer.group.position.x = newPos.x;
      draggingPlayer.group.position.z = newPos.z;
    } else {
      // Ball: dragging on ground plane keeps Y at small height
      setBallPosition(newPos.x, 0.5, newPos.z);
    }
  } else {
    // hover cursor
    const rect = renderer.domElement.getBoundingClientRect();
    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const meshes = [];
    Object.values(players).forEach(p => p.traverse(o => { if (o.isMesh) meshes.push(o); }));
    ballGroup.traverse(o => { if (o.isMesh) meshes.push(o); });
    const hits = raycaster.intersectObjects(meshes);
    renderer.domElement.style.cursor = hits.length > 0 ? 'grab' : '';
  }
});

renderer.domElement.addEventListener('pointerup', () => {
  draggingPlayer = null;
});

/* =====================================================================
   RENDER LOOP
   ===================================================================== */

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const now = performance.now();
  const elapsed = clock.getElapsedTime();

  // === CONTINUOUS PLAYBACK — the rally as one film ===
  if (isPlaying && timeline) {
    const elapsedMs = now - playbackStartTime;
    const tlTime = (elapsedMs / 1000) * playSpeed;
    // Add a 1-second hold after the last frame so the final state is visible
    const HOLD_AFTER_END = 1.0;
    if (tlTime >= timeline.totalDuration + HOLD_AFTER_END) {
      // Fully finished — stop playback
      applyTimelineState(timeline.totalDuration - 0.001);
      stopPlayback();
    } else if (tlTime >= timeline.totalDuration) {
      // In the hold period — show final state
      applyTimelineState(timeline.totalDuration - 0.001);
    } else {
      applyTimelineState(tlTime);
    }
  }

  // Process sandbox tween animations (used by sandbox presets only)
  for (let i = animations.length - 1; i >= 0; i--) {
    const stillRunning = animations[i].update(now);
    if (!stillRunning) animations.splice(i, 1);
  }

  // Camera lerp (for switching between camera presets)
  if (camLerping) {
    const t = Math.min(1, (now - camLerpStart) / 1200);
    const eased = easeInOutCubic(t);
    camera.position.lerpVectors(camLerpFrom.pos, camLerpTo.pos, eased);
    currentTarget.lerpVectors(camLerpFrom.target, camLerpTo.target, eased);
    camera.lookAt(currentTarget);
    if (t >= 1) {
      camLerping = false;
      camDist = camera.position.distanceTo(currentTarget);
      const dx = camera.position.x - currentTarget.x;
      const dy = camera.position.y - currentTarget.y;
      const dz = camera.position.z - currentTarget.z;
      camAzim = Math.atan2(dx, dz);
      camElev = Math.asin(dy / camDist);
    }
  }

  // Subtle ball idle bob — only when not playing and ball is at rest height
  if (!isPlaying && animations.length === 0 && Math.abs(ballGroup.position.y - 0.5) < 0.15) {
    ballGroup.position.y = 0.5 + Math.sin(elapsed * 2) * 0.02;
    glow.material.opacity = 0.12 + Math.sin(elapsed * 3) * 0.04;
  }

  // Player ring pulse
  Object.values(players).forEach((p, i) => {
    const ring = p.userData.ring;
    if (ring) {
      ring.material.opacity = 0.5 + Math.sin(elapsed * 2 + i) * 0.15;
    }
  });

  renderer.render(scene, camera);
}

/* =====================================================================
   INIT
   ===================================================================== */

renderStrategyList();
loadStrategy('invisible-rope');
animate();

// Hide loader after a moment
setTimeout(() => {
  document.getElementById('loading').classList.add('hidden');
  setTimeout(() => document.getElementById('loading').remove(), 600);
}, 800);
